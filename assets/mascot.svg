<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 185" role="img" aria-label="GrowthPoint mascot waving hello">

  <!-- HAIR (back layer, behind head) -->
  <ellipse cx="58" cy="65" rx="30" ry="23" fill="#C0392B"/>
  <path d="M28 75 C20 102 22 150 28 168" stroke="#C0392B" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M88 75 C96 102 94 150 88 168" stroke="#C0392B" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- BODY (navy blazer) -->
  <path d="M20 128 L20 185 L96 185 L96 128 Q58 118 20 128Z" fill="#080F1F"/>
  <!-- Shirt visible at collar -->
  <polygon points="42,128 58,152 74,128" fill="#3F8CFF"/>
  <!-- Blazer lapels -->
  <path d="M42 128 L35 142 L50 135 Z" fill="#0F1E35"/>
  <path d="M74 128 L81 142 L66 135 Z" fill="#0F1E35"/>

  <!-- NECK -->
  <rect x="50" y="112" width="16" height="19" rx="5" fill="#FFD5A8"/>

  <!-- HEAD -->
  <ellipse cx="58" cy="84" rx="28" ry="31" fill="#FFD5A8"/>

  <!-- EARS -->
  <ellipse cx="30" cy="86" rx="6" ry="7" fill="#FFD5A8"/>
  <ellipse cx="86" cy="86" rx="6" ry="7" fill="#FFD5A8"/>
  <ellipse cx="30" cy="86" rx="4" ry="5" fill="#E8B898"/>
  <ellipse cx="86" cy="86" rx="4" ry="5" fill="#E8B898"/>

  <!-- HAIR (front cap) -->
  <path d="M30 80 Q34 54 58 52 Q82 54 86 80 Q72 63 58 65 Q44 63 30 80Z" fill="#C0392B"/>
  <!-- Hair sheen -->
  <path d="M58 52 Q62 60 60 66" stroke="#D44E3A" stroke-width="2" fill="none" opacity="0.65"/>

  <!-- EYEBROWS -->
  <path d="M42 73 Q48 69 52 72" stroke="#7B1C00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64 72 Q68 69 74 73" stroke="#7B1C00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- EYES (whites) -->
  <ellipse cx="49" cy="82" rx="7" ry="8" fill="white"/>
  <ellipse cx="67" cy="82" rx="7" ry="8" fill="white"/>
  <!-- Iris (blue) -->
  <circle cx="49" cy="83" r="5" fill="#2E86C1"/>
  <circle cx="67" cy="83" r="5" fill="#2E86C1"/>
  <!-- Inner iris -->
  <circle cx="49" cy="83" r="3.5" fill="#1A5E85"/>
  <circle cx="67" cy="83" r="3.5" fill="#1A5E85"/>
  <!-- Pupil -->
  <circle cx="49" cy="83" r="2" fill="#0D1820"/>
  <circle cx="67" cy="83" r="2" fill="#0D1820"/>
  <!-- Shine highlights -->
  <circle cx="50.5" cy="81.5" r="1.5" fill="white"/>
  <circle cx="68.5" cy="81.5" r="1.5" fill="white"/>

  <!-- NOSE -->
  <path d="M55 92 Q58 95 61 92" stroke="#C49070" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- SMILE -->
  <path d="M48 100 Q58 109 68 100" stroke="#C07060" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- CHEEK BLUSH -->
  <ellipse cx="38" cy="90" rx="8" ry="5" fill="#FFB0A0" opacity="0.45"/>
  <ellipse cx="78" cy="90" rx="8" ry="5" fill="#FFB0A0" opacity="0.45"/>

  <!-- WAVING ARM -->
  <path d="M86 140 Q106 118 110 88" stroke="#080F1F" stroke-width="15" fill="none" stroke-linecap="round"/>
  <!-- Palm -->
  <circle cx="110" cy="88" r="10" fill="#FFD5A8"/>
  <!-- Fingers -->
  <ellipse cx="104" cy="80" rx="4" ry="6" fill="#FFD5A8"/>
  <ellipse cx="110" cy="78" rx="4" ry="6" fill="#FFD5A8"/>
  <ellipse cx="116" cy="80" rx="4" ry="6" fill="#FFD5A8"/>

</svg>
