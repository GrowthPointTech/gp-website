<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <!-- Isometric 3D cubes in brand colors -->
  <!-- Large lime cube (top) -->
  <g transform="translate(200, 80)">
    <polygon points="0,-60 104,-120 104,0 0,60" fill="#A4E322"/>
    <polygon points="0,-60 -104,-120 -104,0 0,60" fill="#8BC01E"/>
    <polygon points="-104,-120 0,-180 104,-120 0,-60" fill="#C4F74A"/>
  </g>
  <!-- Purple circle -->
  <circle cx="420" cy="100" r="30" fill="#6C5CE7"/>
  <!-- Orange cube (middle right) -->
  <g transform="translate(350, 220)">
    <polygon points="0,-50 87,-100 87,0 0,50" fill="#F6621C"/>
    <polygon points="0,-50 -87,-100 -87,0 0,50" fill="#D4520F"/>
    <polygon points="-87,-100 0,-150 87,-100 0,-50" fill="#FF7E3D"/>
  </g>
  <!-- Small orange cube (center left) -->
  <g transform="translate(150, 300)">
    <polygon points="0,-30 52,-60 52,0 0,30" fill="#F6621C"/>
    <polygon points="0,-30 -52,-60 -52,0 0,30" fill="#D4520F"/>
    <polygon points="-52,-60 0,-90 52,-60 0,-30" fill="#FF7E3D"/>
  </g>
  <!-- Large blue/purple cube (bottom left) -->
  <g transform="translate(200, 440)">
    <polygon points="0,-70 121,-140 121,0 0,70" fill="#0C50D5"/>
    <polygon points="0,-70 -121,-140 -121,0 0,70" fill="#6C5CE7"/>
    <polygon points="-121,-140 0,-210 121,-140 0,-70" fill="#3F8CFF"/>
  </g>
  <!-- Brown/earth cube (bottom right) -->
  <g transform="translate(420, 380)">
    <polygon points="0,-60 104,-120 104,0 0,60" fill="#8B6914"/>
    <polygon points="0,-60 -104,-120 -104,0 0,60" fill="#6B5010"/>
    <polygon points="-104,-120 0,-180 104,-120 0,-60" fill="#A57D1A"/>
  </g>
  <!-- Diamond wireframe accent -->
  <g transform="translate(450, 280)">
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  </g>
</svg>
